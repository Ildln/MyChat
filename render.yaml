services:
  - type: web
    name: mychat
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mychat-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: mychat-db
    databaseName: mychat
    user: mychat
